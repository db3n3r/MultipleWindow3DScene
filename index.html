<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Window 3D - Volumetric Cosmic Orb (Replica)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010101; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: #444; font-family: monospace; pointer-events: none; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Sincronizando janelas...</div>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ==========================================
        // 1. TEXTURA DE POEIRA
        // ==========================================
        function createDustTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const context = canvas.getContext('2d');
            const grad = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            context.fillStyle = grad;
            context.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }
        const dustTexture = createDustTexture();

        // ==========================================
        // 2. SINCRONIA E INÉRCIA DE JANELA
        // ==========================================
        const myId = Date.now() + "_" + Math.random().toString(36).substring(2, 8);
        const prefix = "window_sync_";
        const myBirth = Date.now();
        let lastX = window.screenX, lastY = window.screenY, svx = 0, svy = 0;

        function updateStatus() {
            const dx = window.screenX - lastX, dy = window.screenY - lastY;
            lastX = window.screenX; lastY = window.screenY;
            svx = svx * 0.85 + dx * 0.15; svy = svy * 0.85 + dy * 0.15;
            localStorage.setItem(prefix + myId, JSON.stringify({
                id: myId, x: window.screenX + window.innerWidth/2, y: window.screenY + window.innerHeight/2,
                vx: svx, vy: svy, birth: myBirth, time: Date.now()
            }));
        }

        function getWins() {
            let wins = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith(prefix)) {
                    const d = JSON.parse(localStorage.getItem(k));
                    if (Date.now() - d.time < 2000) wins.push(d);
                    else localStorage.removeItem(k);
                }
            }
            return wins.sort((a,b) => a.id.localeCompare(b.id));
        }

        window.addEventListener('beforeunload', () => localStorage.removeItem(prefix + myId));

        // ==========================================
        // 3. AMBIENTE 3D
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // POST-PROCESSING BLOOM (Iluminação e Profundidade)
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        composer.addPass(bloomPass);

        const orbs = {};
        const colorGreen = new THREE.Color(0x00ff55), colorRed = new THREE.Color(0xff1100);

        // FEIXE (AMPULHETA ORIGINAL DO VÍDEO)
        const beamCount = 20000;
        const beamGeo = new THREE.BufferGeometry();
        const beamPos = new Float32Array(beamCount * 3), beamCol = new Float32Array(beamCount * 3), beamPh = new Float32Array(beamCount);
        for(let i=0; i<beamCount; i++) {
            beamPh[i] = Math.random();
            const c = i >= beamCount/2 ? colorRed : colorGreen;
            beamCol[i*3]=c.r; beamCol[i*3+1]=c.g; beamCol[i*3+2]=c.b;
        }
        beamGeo.setAttribute('position', new THREE.BufferAttribute(beamPos, 3));
        beamGeo.setAttribute('color', new THREE.BufferAttribute(beamCol, 3));
        const beam = new THREE.Points(beamGeo, new THREE.PointsMaterial({ size: 5.5, map: dustTexture, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.35, vertexColors: true, depthWrite: false }));
        scene.add(beam);

        // ==========================================
        // 4. CRIADOR DA ORBE (FIOS DE ENERGIA TIPO ESFERA.HTML)
        // ==========================================
        function createEnergyThreads(radius, count, isCore) {
            const group = new THREE.Group();
            group.userData = { isCore, radius, threads: [] };

            const material = new THREE.LineBasicMaterial({
                color: isCore ? 0xff1100 : 0x3cff82,
                transparent: true,
                opacity: isCore ? 0.9 : 0.6,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });

            for (let i = 0; i < count; i++) {
                const geometry = new THREE.BufferGeometry();
                const pos = new Float32Array(25 * 3); // Histórico de rastro da linha
                geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                
                const line = new THREE.Line(geometry, material.clone());
                line.frustumCulled = false; // Como o bounding box muda muito, evitamos sumir
                group.add(line);

                group.userData.threads.push({
                    line: line,
                    age: 0,
                    life: Math.random() * 150 + 50,
                    r: radius + (Math.random() * (isCore? 4:16) - (isCore?2:8)),
                    theta: Math.random() * Math.PI * 2,
                    phi: Math.acos(Math.random() * 2 - 1),
                    freq1: Math.random() * 3.5 + 1.5,
                    freq2: Math.random() * 3.5 + 1.5,
                    speedMultiplier: Math.random() * 0.015 + 0.005,
                    history: []
                });
            }
            return group;
        }

        function createOrbGroup() {
            const g = new THREE.Group();
            g.add(createEnergyThreads(130, 400, false)); // Casca Principal de Energia 
            g.add(createEnergyThreads(70, 200, true));   // Núcleo (Filamentos densos)
            return g;
        }

        // ==========================================
        // 5. MOTOR FÍSICO DE RENDERIZAÇÃO
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            updateStatus();
            const wins = getWins();
            const time = Date.now() * 0.001;
            const connected = wins.length >= 2;

            camera.position.x = window.screenX + window.innerWidth/2;
            camera.position.y = -(window.screenY + window.innerHeight/2);
            camera.position.z = (window.innerHeight/2) / Math.tan(THREE.MathUtils.degToRad(22.5));

            let connectionElapsed = 0;
            if(connected) connectionElapsed = (Date.now() - Math.max(wins[0].birth, wins[1].birth)) / 1000;

            for (let id in orbs) if (!wins.find(w => w.id === id)) { scene.remove(orbs[id]); delete orbs[id]; }

            wins.forEach((w, idx) => {
                if(!orbs[w.id]) { orbs[w.id] = createOrbGroup(); scene.add(orbs[w.id]); }
                const group = orbs[w.id];
                
                // Mola Elástica (Inércia da Janela)
                if(!group.userData.p) group.userData.p = new THREE.Vector3(w.x, -w.y, 0);
                const d = new THREE.Vector3(w.x, -w.y, 0).sub(group.userData.p);
                group.userData.p.add(d.multiplyScalar(0.12));
                group.position.copy(group.userData.p);

                // Rotação física de toda a estrutura no sentido horário
                const rotationSpeed = -time * 0.3;
                group.rotation.set(0, rotationSpeed, 0); 

                const localCam = camera.position.clone();
                group.worldToLocal(localCam); localCam.normalize();

                const cVx = Math.max(-80, Math.min(80, w.vx || 0));
                const cVy = Math.max(-80, Math.min(80, w.vy || 0));

                // Compensa a rotação do grupo para que a inércia (deleia) não fique de lado
                const theta = group.rotation.y;
                const localVxX = cVx * Math.cos(-theta);
                const localVxZ = cVx * Math.sin(-theta);
                const localVyY = cVy;

                group.children.forEach((mesh, index) => {
                    const tGroup = group.children[index]; 
                    if (!tGroup || !group.userData) return;
                    // Como dividimos orbs em 2 layers, pegamos a ref salva no array `threads`
                    const isCore = mesh.parent.children.indexOf(mesh) === 1;

                    let easeProgress = 1.0;
                    if(isCore) {
                        let cp = Math.max(0, Math.min(1, (connectionElapsed - 1.5) / 2.0));
                        easeProgress = 1 - Math.pow(1-cp, 3);
                        mesh.visible = connected && cp > 0;
                        mesh.scale.setScalar(Math.max(0.001, easeProgress));
                    }
                });

                // Atualizando e desenhando fisicamente os fios de plasma igual ao esfera.html
                [group.children[0], group.children[1]].forEach((layerGroup) => {
                    if(!layerGroup || !layerGroup.userData || !layerGroup.userData.threads) return;
                    const threads = layerGroup.userData.threads;
                    const isCore = layerGroup.userData.isCore;
                    const maxRadius = layerGroup.userData.radius;

                    // Ajuste dinâmico de Cores baseado na janela (idx 0 ou 1):
                    // Janela 0: Casca Verde (0x3cff82) e Núcleo Vermelho (0xff1100)
                    // Janela 1: Casca Vermelha (0xff1100) e Núcleo Verde (0x3cff82)
                    const targetColor = isCore ? (idx === 0 ? 0xff1100 : 0x3cff82) : (idx === 0 ? 0x3cff82 : 0xff1100);

                    for (let t of threads) {
                        t.line.material.color.setHex(targetColor);
                        t.age++;
                        if (t.age > t.life) {
                            t.age = 0;
                            t.life = Math.random() * 150 + 50; 
                            t.r = maxRadius + (Math.random() * (isCore?4:16) - (isCore?2:8)); 
                            t.theta = Math.random() * Math.PI * 2;
                            t.phi = Math.acos(Math.random() * 2 - 1);
                            t.history = [];
                        }

                        // Algoritmo do plasma escorrendo orgânico
                        const rTime = time * 0.3;
                        t.theta += Math.sin(t.phi * t.freq1 + rTime) * t.speedMultiplier;
                        t.phi += Math.cos(t.theta * t.freq2 - rTime) * t.speedMultiplier;

                        if (t.phi < 0.01) t.phi = 0.01;
                        if (t.phi > Math.PI - 0.01) t.phi = Math.PI - 0.01;

                        // Cartesianas sobre a esfera
                        let bx = t.r * Math.sin(t.phi) * Math.cos(t.theta);
                        let by = t.r * Math.cos(t.phi);
                        let bz = t.r * Math.sin(t.phi) * Math.sin(t.theta);

                        // FÍSICA CINÉTICA (Aplica "Geleia" da Inercia da Janela ao Raio)
                        const len = Math.sqrt(bx*bx + by*by + bz*bz);
                        let nxRaw = bx/len, nyRaw = by/len, nzRaw = bz/len;
                        const dotV = nxRaw*localVxX + nyRaw*localVyY + nzRaw*localVxZ;
                        const kinetic = (-dotV) * (isCore ? 0.15 : 0.4);
                        
                        bx += nxRaw * kinetic - (localVxX * (isCore ? 0.1 : 0.25));
                        by += nyRaw * kinetic + (localVyY * (isCore ? 0.1 : 0.25));
                        bz += nzRaw * kinetic - (localVxZ * (isCore ? 0.1 : 0.25));

                        t.history.push({ x: bx, y: by, z: bz });
                        if (t.history.length > 25) t.history.shift();

                        // Renderiza o rastro no BufferGeometry
                        if (t.history.length > 1) {
                            const pos = t.line.geometry.attributes.position;
                            let avgZ = 0, avgX = 0, avgY = 0;
                            for (let i = 0; i < 25; i++) {
                                // Preenche os não utilizados com o último conhecido pra esconder falhas
                                const pt = i < t.history.length ? t.history[i] : t.history[t.history.length - 1];
                                pos.setXYZ(i, pt.x, pt.y, pt.z);
                                if (i < t.history.length) {
                                    avgZ += pt.z;
                                    avgX += pt.x;
                                    avgY += pt.y;
                                }
                            }
                            avgZ /= t.history.length;
                            avgX /= t.history.length;
                            avgY /= t.history.length;
                            pos.needsUpdate = true;

                            // Alpha Pulse Animation e Fresnel (Oco)
                            let lifePhase = Math.sin((t.age / t.life) * Math.PI); 
                            let alpha = (isCore ? 0.9 : 0.6) * lifePhase;

                            // Apaga a casca em TODA a região cilíndrica visual (frente E trás) ocupada pelo núcleo.
                            // Como usamos AdditiveBlending, a parte de trás da casca também precisa sumir para não misturar cores.
                            if (connected && !isCore) {
                                const dotCamera = avgX * localCam.x + avgY * localCam.y + avgZ * localCam.z;
                                
                                // Removida a trava (dotCamera > 0) para o corte vazar a esfera inteira
                                const lenSq = avgX * avgX + avgY * avgY + avgZ * avgZ;
                                const dist = Math.sqrt(Math.max(0, lenSq - (dotCamera * dotCamera)));
                                
                                // O núcleo tem raio 70. Expandimos o corte para 90 para compensar o Bloom.
                                if (dist < 90) {
                                    // Tudo abaixo de dist 75 fica com opacidade 0 (branco/vazio absoluto).
                                    // De 75 a 90, ele faz um fade suave para não deixar a borda serrilhada.
                                    const fadeFactor = Math.max(0, (dist - 75) / 15);
                                    alpha *= fadeFactor * fadeFactor; 
                                }
                            }

                            t.line.material.opacity = Math.max(0, alpha);
                        }
                    }
                });
            });

            // BEAM (AMPULHETA DE PARTÍCULAS ORIGINAL)
            if(connected) {
                const w1 = wins[0], w2 = wins[1], p1 = orbs[w1.id].userData.p, p2 = orbs[w2.id].userData.p;
                const maxT = Math.min(1, connectionElapsed / 1.5);
                for(let i=0; i<beamCount; i++) {
                    let t = (time * 0.6 + beamPh[i]) % 1;
                    if(t > maxT) { beamPos[i*3] = 99999; continue; }
                    const isB = i >= beamCount/2, s = isB ? p2 : p1, tg = isB ? p1 : p2;
                    const phi = Math.acos(1 - 2 * (i / beamCount)), th = Math.PI * (1 + Math.sqrt(5)) * i;
                    const sX = s.x + 130 * Math.sin(phi) * Math.cos(th), sY = s.y + 130 * Math.sin(phi) * Math.sin(th), sZ = 130 * Math.cos(phi);
                    const tX = tg.x + 70 * Math.sin(phi) * Math.cos(th), tY = tg.y + 70 * Math.sin(phi) * Math.sin(th), tZ = 70 * Math.cos(phi);
                    let px = sX + (tX-sX)*t, py = sY + (tY-sY)*t, pz = sZ + (tZ-sZ)*t;
                    const turb = Math.sin(t*Math.PI)*35, ang = time*2.5 + i*0.05;
                    px += Math.cos(ang)*turb; py += Math.sin(ang)*turb;
                    const axX = s.x + (tg.x-s.x)*t, axY = s.y + (tg.y-s.y)*t, pinch = 1 - 0.97*Math.sin(t*Math.PI);
                    let pnx = axX + (px-axX)*pinch, pny = axY + (py-axY)*pinch, pnz = pz*pinch;
                    const hR = 8*Math.sin(t*Math.PI), d = Math.sqrt((pnx-axX)**2 + (pny-axY)**2);
                    if(d>0) { px = pnx + (pnx-axX)/d*hR; py = pny + (pny-axY)/d*hR; pz = pnz; }
                    else { px = pnx + Math.cos(ang)*hR; py = pny + Math.sin(ang)*hR; pz = pnz; }
                    beamPos[i*3]=px; beamPos[i*3+1]=py; beamPos[i*3+2]=pz;
                }
                beamGeo.attributes.position.needsUpdate = true; beam.visible = true;
            } else beam.visible = false;

            composer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); });
    </script>
</body>
</html>
