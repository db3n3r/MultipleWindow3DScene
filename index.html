<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Window 3D - Two Spherical Earths Siphoning Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ── Textura suave (glow) para cada partícula ───────────────────────
        function createDustTexture() {
            const c = document.createElement('canvas');
            c.width = c.height = 32;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(16,16,0,16,16,16);
            g.addColorStop(0,   'rgba(255,255,255,1)');
            g.addColorStop(0.3, 'rgba(255,255,255,0.85)');
            g.addColorStop(1,   'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0,0,32,32);
            return new THREE.CanvasTexture(c);
        }
        const dustTexture = createDustTexture();

        // Cores dos dois mundos (verde-esmeralda e laranja-fogo), como no vídeo
        const COLORS = [0x35c27a, 0xff5a2c];

        // ── SINCRONIZAÇÃO ENTRE JANELAS (localStorage) ─────────────────────
        const myId    = Date.now() + "_" + Math.random().toString(36).substring(2,8);
        const prefix  = "window_sync_";
        const myBirth = Date.now();
        let lastX = window.screenX, lastY = window.screenY, svx = 0, svy = 0;

        function updateStatus() {
            const dx = window.screenX - lastX, dy = window.screenY - lastY;
            lastX = window.screenX; lastY = window.screenY;
            svx = svx*0.85 + dx*0.15;
            svy = svy*0.85 + dy*0.15;
            localStorage.setItem(prefix + myId, JSON.stringify({
                id: myId,
                x: window.screenX + window.innerWidth/2,
                y: window.screenY + window.innerHeight/2,
                vx: svx, vy: svy, birth: myBirth, time: Date.now()
            }));
        }

        function getWins() {
            const wins = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k && k.startsWith(prefix)) {
                    try {
                        const d = JSON.parse(localStorage.getItem(k));
                        if (Date.now() - d.time < 2000) wins.push(d);
                        else localStorage.removeItem(k);
                    } catch(e) { localStorage.removeItem(k); }
                }
            }
            return wins.sort((a,b) => a.id.localeCompare(b.id));
        }

        window.addEventListener('beforeunload', () => localStorage.removeItem(prefix + myId));

        // ── CENA / CÂMERA / RENDERER ───────────────────────────────────────
        const scene    = new THREE.Scene();
        const camera   = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        document.body.appendChild(renderer.domElement);

        const composer  = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.3, 0.55, 0.72);
        composer.addPass(bloomPass);

        const RADIUS = 130;            // raio dos mundos
        const CORE_RADIUS = 68;        // raio do núcleo (matéria recebida do outro mundo)
        const orbs = {};               // id -> grupo

        // ── GERA OS CONTINENTES COMO PARTÍCULAS (a partir da textura) ───────
        // Vetores unitários (direções na esfera) onde existe terra firme.
        let continentDirs = null;

        function buildContinentDirs(img) {
            const cw = 1024, ch = 512;
            const cv = document.createElement('canvas');
            cv.width = cw; cv.height = ch;
            const cx = cv.getContext('2d');
            cx.drawImage(img, 0, 0, cw, ch);
            let data;
            try { data = cx.getImageData(0, 0, cw, ch).data; }
            catch(e) { return buildFallbackDirs(); } // CORS bloqueou a leitura

            const dirs = [];
            const target = 11000;
            let attempts = 0;
            while (dirs.length/3 < target && attempts < target*60) {
                attempts++;
                const u = Math.random();
                const y = 2*Math.random() - 1;     // cos(phi) -> distribuição uniforme
                const phi = Math.acos(y);
                const theta = 2*Math.PI*u;
                const px = Math.min(cw-1, Math.floor(u*cw));
                const py = Math.min(ch-1, Math.floor((phi/Math.PI)*ch));
                const r = data[(py*cw + px)*4] / 255;
                // earth_specular: oceano = claro (especular), continente = escuro
                if (r < 0.35) {
                    const s = Math.sin(phi);
                    dirs.push(s*Math.cos(theta), y, s*Math.sin(theta));
                }
            }
            return new Float32Array(dirs);
        }

        // Caso a textura não carregue/leia: esfera de partículas uniforme.
        function buildFallbackDirs() {
            const n = 9000, dirs = new Float32Array(n*3);
            for (let i=0;i<n;i++){
                const y = 2*Math.random()-1, phi=Math.acos(y), th=2*Math.PI*Math.random();
                const s = Math.sin(phi);
                dirs[i*3]=s*Math.cos(th); dirs[i*3+1]=y; dirs[i*3+2]=s*Math.sin(th);
            }
            return dirs;
        }

        const textureLoader = new THREE.TextureLoader();
        textureLoader.crossOrigin = 'Anonymous';
        textureLoader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg',
            tex => { continentDirs = buildContinentDirs(tex.image); },
            undefined,
            () => { continentDirs = buildFallbackDirs(); }
        );

        // ── CONSTRÓI UM MUNDO (continentes em partículas + atmosfera) ──────
        function makeEarthPoints(colorHex, radius) {
            const n = continentDirs.length/3;
            const pos = new Float32Array(n*3);
            for (let i=0;i<n;i++){
                const jit = radius * (0.985 + Math.random()*0.03);
                pos[i*3]   = continentDirs[i*3]   * jit;
                pos[i*3+1] = continentDirs[i*3+1] * jit;
                pos[i*3+2] = continentDirs[i*3+2] * jit;
            }
            const g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const m = new THREE.PointsMaterial({
                size: 2.4, map: dustTexture, color: new THREE.Color(colorHex),
                blending: THREE.AdditiveBlending, depthWrite: false,
                transparent: true, opacity: 1.0
            });
            const points = new THREE.Points(g, m);
            // ── Estado da deformação elástica ──────────────────────────────
            // base = posição em repouso; norm = direção unitária na esfera (para
            // saber onde a partícula está em relação ao eixo do movimento);
            // off = deslocamento atual; weights = soltura orgânica por partícula.
            const base = pos.slice();
            const norm = new Float32Array(n*3);
            const weights = new Float32Array(n);
            for (let i=0;i<n;i++){
                const k=i*3;
                const len = Math.hypot(base[k], base[k+1], base[k+2]) || 1;
                norm[k]=base[k]/len; norm[k+1]=base[k+1]/len; norm[k+2]=base[k+2]/len;
                weights[i] = 0.7 + Math.random()*0.6; // 0.7..1.3
            }
            points.userData.base    = base;
            points.userData.norm    = norm;
            points.userData.off     = new Float32Array(n*3);
            points.userData.weights = weights;
            points.userData.radius  = radius;
            return points;
        }

        // ── DEFORMAÇÃO ELÁSTICA DA ESFERA ──────────────────────────────────
        // Recebe W = vetor de "balanço" (direção do movimento × energia). A
        // deformação é ASSIMÉTRICA, como a inércia de um corpo mole: SÓ o
        // hemisfério OPOSTO ao movimento reage — a matéria é "jogada para trás".
        //   • back = quanto a partícula olha para o lado oposto ao movimento;
        //   • a traseira incha/estica para trás → bojo de inércia;
        //   • a frente e o equador quase não se mexem.
        // Como W é uma MOLA que passa do ponto ao parar, a forma treme (gelatina).
        const STRETCH = 3.4;   // intensidade da expansão traseira (lado oposto ao mov.)
        const BULGE   = 0.2;  // 0 = só estica p/ trás (cauda) · 1 = só incha radialmente
        const BACKPOW = 10.5;   // ↑ concentra mais no polo traseiro (cauda mais "fina")
        const LEAN    = 0.85;  // arrasto uniforme leve de toda a casca
        const FOLLOW  = 0.09;  // suavização da superfície (quanto < , mais "mole")
        function updateShellElastic(mesh, W, scale) {
            const arr  = mesh.geometry.attributes.position.array;
            const base = mesh.userData.base;
            const norm = mesh.userData.norm;
            const off  = mesh.userData.off;
            const wgt  = mesh.userData.weights;
            const n    = wgt.length;
            // W chega no espaço do GRUPO. Converte para o espaço LOCAL deste mesh
            // (a casca tem rotação identidade; o núcleo gira sozinho). Assim a casca
            // e o núcleo deformam exatamente na MESMA direção do balanço.
            _mq.copy(mesh.quaternion).invert();
            _wl.copy(W).applyQuaternion(_mq);
            const wlen = _wl.length();
            const st = STRETCH*scale, ln = LEAN*scale;
            // eixo unitário do movimento (se quase parado, alvo ~0 → relaxa à esfera)
            const ux = wlen>1e-4 ? _wl.x/wlen : 0;
            const uy = wlen>1e-4 ? _wl.y/wlen : 0;
            const uz = wlen>1e-4 ? _wl.z/wlen : 0;
            for (let i=0;i<n;i++){
                const k=i*3, wi=wgt[i];
                // projeção no eixo do movimento: +1 = frente (sentido do movimento),
                // -1 = traseira (lado OPOSTO ao movimento).
                const along = norm[k]*ux + norm[k+1]*uy + norm[k+2]*uz;
                // SÓ o hemisfério oposto reage (along<0). 0 na frente/equador..1 atrás.
                const back = along < 0 ? Math.pow(-along, BACKPOW) : 0;
                const amt  = back * wlen * st * wi;
                // direção do bojo: mistura entre "para trás" (-u) e "inchar p/ fora"
                // (radial +norm) → expansão concentrada ATRÁS do movimento.
                const dirx = -ux*(1-BULGE) + norm[k]  *BULGE;
                const diry = -uy*(1-BULGE) + norm[k+1]*BULGE;
                const dirz = -uz*(1-BULGE) + norm[k+2]*BULGE;
                // alvo = bojo traseiro + leve arrasto uniforme (toda a casca recua um pouco)
                const tx = dirx*amt - ux*wlen*ln*wi;
                const ty = diry*amt - uy*wlen*ln*wi;
                const tz = dirz*amt - uz*wlen*ln*wi;
                // superfície segue o alvo com leve atraso → tremor de gelatina
                off[k]   += (tx - off[k]  )*FOLLOW;
                off[k+1] += (ty - off[k+1])*FOLLOW;
                off[k+2] += (tz - off[k+2])*FOLLOW;
                arr[k]   = base[k]   + off[k];
                arr[k+1] = base[k+1] + off[k+1];
                arr[k+2] = base[k+2] + off[k+2];
            }
            mesh.geometry.attributes.position.needsUpdate = true;
        }

        function createAtmosphere(rMin, rMax, count, colorHex) {
            const geometry  = new THREE.BufferGeometry();
            const positions = new Float32Array(count*3);
            const pData = [];
            for (let i=0;i<count;i++){
                pData.push({
                    r: rMin + (rMax-rMin)*Math.cbrt(Math.random()),
                    theta: Math.random()*2*Math.PI,
                    phi:   Math.acos(Math.random()*2-1),
                    speed: Math.random()*0.6 + 0.15,
                    wobble: Math.random()*Math.PI*2
                });
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const m = new THREE.PointsMaterial({
                size: 3.0, map: dustTexture, color: new THREE.Color(colorHex),
                blending: THREE.AdditiveBlending, depthWrite: false,
                transparent: true, opacity: 0.55
            });
            const mesh = new THREE.Points(geometry, m);
            mesh.userData.pData = pData;
            mesh.userData.rMax = rMax;
            return mesh;
        }

        // drag = deslocamento físico (espaço local), opcional. Partículas mais
        // externas (soltas) reagem mais ao balanço da janela do que as internas.
        function updateAtmosphere(mesh, drag) {
            const positions = mesh.geometry.attributes.position.array;
            const pData = mesh.userData.pData;
            const rMax = mesh.userData.rMax || 1;
            const dx = drag ? drag.x : 0, dy = drag ? drag.y : 0, dz = drag ? drag.z : 0;
            for (let i=0;i<pData.length;i++){
                const p = pData[i];
                p.theta  += p.speed * 0.003;
                p.wobble += 0.03;
                const r = p.r + Math.sin(p.wobble)*4;
                const s = Math.sin(p.phi);
                const loose = p.r / rMax;   // 0 (interno) .. 1 (externo)
                positions[i*3]   = r*s*Math.cos(p.theta) + dx*loose;
                positions[i*3+1] = r*Math.cos(p.phi)     + dy*loose;
                positions[i*3+2] = r*s*Math.sin(p.theta) + dz*loose;
            }
            mesh.geometry.attributes.position.needsUpdate = true;
        }

        function createOrb(colorHex, coreColorHex) {
            const g = new THREE.Group();
            g.add(makeEarthPoints(colorHex, RADIUS));         // [0] continentes (casca)
            g.add(createAtmosphere(74, 150, 1600, colorHex)); // [1] atmosfera

            // [2] núcleo: planeta menor da COR OPOSTA (matéria vinda do outro mundo)
            const core = makeEarthPoints(coreColorHex, CORE_RADIUS);
            core.visible = false;
            core.scale.setScalar(0.001);
            g.add(core);

            // [3] atmosfera do núcleo
            const coreAtmo = createAtmosphere(8, CORE_RADIUS-4, 700, coreColorHex);
            coreAtmo.visible = false;
            coreAtmo.scale.setScalar(0.001);
            g.add(coreAtmo);

            return g;
        }

        // ── SISTEMA DE PARTÍCULAS DA CONEXÃO (o "sifão") ───────────────────
        const CONN_COUNT = 20000;
        const connGeo = new THREE.BufferGeometry();
        const connPos = new Float32Array(CONN_COUNT*3);
        const connCol = new Float32Array(CONN_COUNT*3);
        const connDir = []; // direção fixa por partícula (de onde sai na esfera)
        const connPhase = new Float32Array(CONN_COUNT);
        const connFwd   = new Uint8Array(CONN_COUNT); // 1 = c1->c2, 0 = c2->c1
        for (let i=0;i<CONN_COUNT;i++){
            const y = 2*Math.random()-1, phi=Math.acos(y), th=2*Math.PI*Math.random();
            const s = Math.sin(phi);
            connDir.push(new THREE.Vector3(s*Math.cos(th), y, s*Math.sin(th)));
            connPhase[i] = Math.random();
            connFwd[i]   = (i % 2);            // metade em cada sentido
        }
        connGeo.setAttribute('position', new THREE.BufferAttribute(connPos, 3));
        connGeo.setAttribute('color',    new THREE.BufferAttribute(connCol, 3));
        const connMat = new THREE.PointsMaterial({
            size: 2.2, map: dustTexture, vertexColors: true,
            blending: THREE.AdditiveBlending, depthWrite: false,
            transparent: true, opacity: 0.95
        });
        const connection = new THREE.Points(connGeo, connMat);
        connection.frustumCulled = false;
        connection.visible = false;
        scene.add(connection);

        // Buffers reaproveitados (evita alocar por frame)
        const _c1 = new THREE.Vector3(), _c2 = new THREE.Vector3();
        const _p1 = new THREE.Vector3(), _p2 = new THREE.Vector3();
        const _straight = new THREE.Vector3(), _axis = new THREE.Vector3(), _pos = new THREE.Vector3();
        const _colA = new THREE.Color(), _colB = new THREE.Color(), _col = new THREE.Color();
        // temporários da física de balanço
        const _wv = new THREE.Vector3(), _tmp = new THREE.Vector3();
        const _localDrag = new THREE.Vector3(), _wl = new THREE.Vector3();
        const _invQ = new THREE.Quaternion(), _mq = new THREE.Quaternion();

        function updateConnection(orbA, orbB, progress, time, colorA, colorB) {
            _c1.copy(orbA.position);
            _c2.copy(orbB.position);
            _colA.set(colorA); _colB.set(colorB);

            const flowSpeed = 0.18;
            for (let i = 0; i < CONN_COUNT; i++) {
                const dir = connDir[i];
                let u = connPhase[i] + time * flowSpeed;
                u = u - Math.floor(u);

                // fwd = c1→c2 (cor A, ex: verde indo ao núcleo vermelho)
                // !fwd = c2→c1 (cor B, ex: vermelho indo ao núcleo verde)
                const fwd = connFwd[i] === 1;

                // pp: 0 = saída (casca de origem), 1 = chegada (núcleo de destino)
                const pp = u;

                // Endpoints: casca da origem → núcleo do destino
                if (fwd) {
                    _p1.copy(_c1).addScaledVector(dir, RADIUS);       // casca de orbA
                    _p2.copy(_c2).addScaledVector(dir, CORE_RADIUS);  // núcleo de orbB
                } else {
                    _p1.copy(_c2).addScaledVector(dir, RADIUS);       // casca de orbB
                    _p2.copy(_c1).addScaledVector(dir, CORE_RADIUS);  // núcleo de orbA
                }

                // Straight = interpolação linear entre os dois endpoints
                _straight.copy(_p1).lerp(_p2, pp);

                // Axis = interpolação entre os centros, na mesma direção de viagem
                const srcC = fwd ? _c1 : _c2;
                const dstC = fwd ? _c2 : _c1;
                _axis.copy(srcC).lerp(dstC, pp);

                // Pinch cria o afunilamento no meio (ampulheta) — mais aberto nas extremidades
                const pinch = 1.0 - 0.82 * Math.sin(pp * Math.PI);
                _pos.copy(_straight).sub(_axis).multiplyScalar(pinch).add(_axis);

                // Fade-in ao emergir da casca da esfera de origem; visível até o núcleo
                const dSrc = _pos.distanceTo(srcC);
                const fSrc = THREE.MathUtils.smoothstep(dSrc, RADIUS - 4, RADIUS + 24);

                // Cintilação
                const tw = 0.55 + 0.45 * Math.sin(u * 20.0 + connPhase[i] * 28.0);
                const a  = fSrc * progress * tw;

                connPos[i*3]   = _pos.x;
                connPos[i*3+1] = _pos.y;
                connPos[i*3+2] = _pos.z;

                // Cor da origem mantida em TODO o trajeto (verde chega verde ao núcleo vermelho)
                _col.copy(fwd ? _colA : _colB).multiplyScalar(a);
                connCol[i*3]   = _col.r;
                connCol[i*3+1] = _col.g;
                connCol[i*3+2] = _col.b;
            }
            connGeo.attributes.position.needsUpdate = true;
            connGeo.attributes.color.needsUpdate = true;
        }

        // ── LOOP PRINCIPAL ─────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            updateStatus();

            const time = Date.now() * 0.001;

            // câmera mapeada para o espaço da tela (multi-janela)
            camera.position.x = window.screenX + innerWidth/2;
            camera.position.y = -(window.screenY + innerHeight/2);
            camera.position.z = (innerHeight/2) / Math.tan(THREE.MathUtils.degToRad(22.5));

            if (!continentDirs) { composer.render(); return; } // espera a textura

            const wins = getWins();
            const connected = wins.length >= 2;
            let connectionElapsed = 0;
            if (connected)
                connectionElapsed = (Date.now() - Math.max(wins[0].birth, wins[1].birth)) / 1000;

            // remove mundos de janelas que sumiram
            for (const id in orbs)
                if (!wins.find(w => w.id === id)) { scene.remove(orbs[id]); delete orbs[id]; }

            wins.forEach((w, idx) => {
                const colorHex     = COLORS[idx % COLORS.length];
                const coreColorHex = COLORS[(idx + 1) % COLORS.length]; // cor do OUTRO mundo
                if (!orbs[w.id]) { orbs[w.id] = createOrb(colorHex, coreColorHex); scene.add(orbs[w.id]); }
                const group = orbs[w.id];

                // mantém as cores coerentes mesmo se a ordem mudar
                group.children[0].material.color.set(colorHex);
                group.children[1].material.color.set(colorHex);
                group.children[2].material.color.set(coreColorHex);
                group.children[3].material.color.set(coreColorHex);
                // ── posição com inércia (mantém o orbe centrado na janela) ──
                // Guarda o passo deste frame (quanto o orbe andou na tela) = velocidade.
                if (!group.userData.p) group.userData.p = new THREE.Vector3(w.x, -w.y, 0);
                const cur = group.userData.p;
                const _px = cur.x, _py = cur.y;
                cur.x += (w.x  - cur.x)*0.12;
                cur.y += (-w.y - cur.y)*0.12;
                group.position.copy(cur);
                const sdx = cur.x - _px, sdy = cur.y - _py; // velocidade do orbe (mundo)

                // rotação do planeta
                group.rotation.set(0.35, time*0.18, 0);

                // ── MOLA VETORIAL DE BALANÇO (W) ───────────────────────────
                // W é a "energia de balanço". A velocidade da janela dá um IMPULSO
                // em W, e uma mola fraca o traz de volta ao repouso BEM devagar,
                // com amortecimento alto → a esfera estica e fica tremendo por
                // vários segundos. É o que controla quão DEMORADO é o efeito.
                //   WSTIFF ↓ = retorno mais lento (oscila mais devagar)
                //   WDAMP  → perto de 1 = treme por MUITO mais tempo
                //   VGAIN  = força do impulso (o quanto a velocidade vira deformação)
                //   WCLAMP = limite da deformação (evita explodir)
                const WSTIFF = 0.004, WDAMP = 0.985, VGAIN = 0.45, WCLAMP = 82;
                if (!group.userData.W){ group.userData.W = new THREE.Vector3(); group.userData.Wv = new THREE.Vector3(); }
                const Wv = group.userData.Wv, Wvec = group.userData.W;
                // velocidade da janela no espaço LOCAL do grupo (que gira)
                _invQ.copy(group.quaternion).invert();
                _wv.set(sdx, sdy, 0).applyQuaternion(_invQ);
                // impulso pela velocidade + mola lenta de volta a 0 + amortecimento alto
                Wv.addScaledVector(_wv, VGAIN);     // chute do movimento
                Wv.addScaledVector(Wvec, -WSTIFF);  // mola fraca puxando ao repouso
                Wv.multiplyScalar(WDAMP);           // amortecimento (alto = demora)
                Wvec.add(Wv);
                Wvec.clampLength(0, WCLAMP);

                // casca: deforma de acordo com a posição de cada partícula no eixo W
                updateShellElastic(group.children[0], Wvec, 1.0);
                updateAtmosphere(group.children[1], Wvec);

                // núcleo da cor oposta cresce quando os mundos estão conectados,
                // indicando a troca/acúmulo de partículas vindas do outro mundo
                const core = group.children[2];
                const coreAtmo = group.children[3];
                if (connected) {
                    // núcleo começa a aparecer após 1 s de conexão e leva 3.5 s para crescer totalmente
                    const cp = Math.max(0, Math.min(1, (connectionElapsed - 1.0) / 3.5));
                    const ep = 1 - Math.pow(1 - cp, 3);          // ease-out suave
                    const s  = Math.max(0.001, ep);
                    core.visible = true;     core.scale.setScalar(s);     core.rotation.y = -time*0.4;
                    updateShellElastic(core, Wvec, 0.7);
                    coreAtmo.visible = true; coreAtmo.scale.setScalar(s);
                    updateAtmosphere(coreAtmo, Wvec);
                } else {
                    core.visible = false;     core.scale.setScalar(0.001);
                    coreAtmo.visible = false; coreAtmo.scale.setScalar(0.001);
                }
            });

            // ── O SIFÃO: partículas fluindo entre os dois mundos ───────────
            if (connected && orbs[wins[0].id] && orbs[wins[1].id]) {
                const progress = Math.max(0.02, Math.min(1, connectionElapsed / 1.5));
                updateConnection(
                    orbs[wins[0].id], orbs[wins[1].id],
                    progress, time,
                    COLORS[0], COLORS[1]
                );
                connection.visible = true;
            } else {
                connection.visible = false;
            }

            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(innerWidth, innerHeight);
            camera.aspect = innerWidth/innerHeight;
            camera.updateProjectionMatrix();
            composer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
</html>
